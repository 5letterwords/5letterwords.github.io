<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Meeral - Get In Touch</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <style>
    .contact-section { padding: 80px 0; background: var(--bg); }
    .contact-card { 
      background: white; border-radius: var(--radius); 
      box-shadow: var(--shadow-lg); border: 1.5px solid var(--border);
      padding: 40px; max-width: 600px; margin: 0 auto;
    }
    .contact-info { text-align: center; margin-bottom: 40px; }
    .info-item { margin-bottom: 15px; font-weight: 700; color: var(--text); }
    .info-item a { color: var(--primary); text-decoration: underline; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--text-light); }
    .form-group input, .form-group textarea { 
      width: 100%; padding: 12px; border: 2px solid var(--border); 
      border-radius: var(--radius-sm); font-family: var(--font-body);
    }
    .form-group input:focus, .form-group textarea:focus { 
      outline: none; border-color: var(--primary); 
    }
  </style>
</head>
<body>
  <div id="header-root"></div>

  <main class="contact-section">
    <div class="container">
      <div class="section-header">
        <span class="section-tag">Contact</span>
        <h2>Get In Touch</h2>
        <p>Have a question about our word finder or want to work together on a web project?</p>
      </div>

      <div class="contact-card reveal">
        <div class="contact-info">
          <div class="info-item">📧 Email: <a href="mailto:meraalshah447@gmail.com">meraalshah447@gmail.com</a></div>
          <div class="info-item">📍 Location: Karachi, Sindh, Pakistan</div>
        </div>

        <form id="contactForm">
          <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Your Name" required />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="Your Email Address" required />
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea rows="5" placeholder="How can I help you?"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Send Message</button>
        </form>
      </div>
    </div>
  </main>

  <div id="footer-root"></div>

  <script src="words-data.js"></script>
  <script src="components.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById('contactForm')?.addEventListener('submit', (e) => {
      e.preventDefault();
      // Use the showToast function from app.js
      if(typeof showToast === 'function') {
        showToast("Thanks! Meeral will get back to you soon.");
      } else {
        alert("Message sent successfully!");
      }
      e.target.reset();
    });
  </script>
</body>
</html>
